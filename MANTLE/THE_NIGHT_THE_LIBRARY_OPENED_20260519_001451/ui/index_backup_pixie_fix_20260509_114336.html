<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<title>Shine L</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{

    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e3a5f
    );

    color:white;

    min-height:100vh;

    overflow:hidden;
}

.container{

    display:flex;

    flex-direction:column;

    height:100vh;

    width:100%;

    max-width:900px;

    margin:auto;
}

.header{

    padding:18px;

    font-size:34px;

    font-weight:bold;

    flex-shrink:0;
}

.chat-box{

    flex:1;

    overflow-y:auto;

    padding:18px;

    padding-bottom:120px;

    background:rgba(0,0,0,0.25);

    border-radius:16px;

    margin:0 12px 12px 12px;
}

.message{

    margin-bottom:36px;
}

.user{

    color:#ffffff;

    font-weight:bold;

    margin-bottom:12px;

    font-size:26px;
}

.bot{

    color:#8fffa2;

    font-weight:bold;

    margin-bottom:12px;

    font-size:26px;
}

.msg-text{

    white-space:normal;

    line-height:1.9;

    word-wrap:break-word;

    overflow-wrap:break-word;

    font-size:20px;

    color:white;
}

.msg-text p{

    margin-bottom:22px;
}

.msg-text h1{

    font-size:36px;

    margin-top:34px;

    margin-bottom:20px;

    color:#ffffff;
}

.msg-text h2{

    font-size:30px;

    margin-top:30px;

    margin-bottom:18px;

    color:#ffffff;
}

.msg-text h3{

    font-size:25px;

    margin-top:26px;

    margin-bottom:16px;

    color:#ffffff;
}

.msg-text ul{

    margin-top:12px;

    margin-bottom:24px;

    padding-left:28px;
}

.msg-text li{

    margin-bottom:12px;
}

.msg-text strong{

    color:#ffffff;
}

.input-row{

    display:flex;

    gap:10px;

    padding:12px;

    background:rgba(0,0,0,0.25);

    position:sticky;

    bottom:0;

    flex-shrink:0;
}

.upload-btn{

    width:56px;

    height:56px;

    border-radius:14px;

    background:#2563eb;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:32px;

    font-weight:bold;

    cursor:pointer;

    flex-shrink:0;
}

input{

    flex:1;

    padding:16px;

    border:none;

    border-radius:12px;

    font-size:18px;

    outline:none;

    min-width:0;
}

button{

    background:#00d26a;

    color:white;

    border:none;

    border-radius:12px;

    padding:16px 20px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    flex-shrink:0;
}

@media(max-width:600px){

    .header{

        font-size:32px;

        padding:18px;
    }

    .msg-text{

        font-size:21px;

        line-height:2.0;
    }

    .chat-box{

        margin:0 8px 8px 8px;

        padding:16px;

        padding-bottom:120px;
    }

    .input-row{

        padding:10px;

        padding-bottom:calc(
            10px + env(safe-area-inset-bottom)
        );
    }

    input{

        font-size:16px;
    }

    button{

        font-size:16px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
        ">

            <div>Shine L</div>

            <button
                onclick="loadStories()"
                style="
                    background:#7c3aed;
                    padding:10px 14px;
                    font-size:14px;
                "
            >
                Stories
            </button>

        </div>

    </div>

    <div
        class="chat-box"
        id="chat"
    ></div>

    <div class="input-row">

        <label
            for="fileUpload"
            class="upload-btn"
        >
            +
        </label>

        <input
            type="file"
            id="fileUpload"
            style="display:none"
            onchange="uploadFile()"
        />

        <input
            id="input"
            placeholder="Talk to L..."
        />

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

function formatMessage(text){

    let html = text;

    // headings

    html = html.replace(
        /^### (.*)$/gm,
        "<h3>$1</h3>"
    );

    html = html.replace(
        /^## (.*)$/gm,
        "<h2>$1</h2>"
    );

    html = html.replace(
        /^# (.*)$/gm,
        "<h1>$1</h1>"
    );

    // bold

    html = html.replace(
        /\*\*(.*?)\*\*/g,
        "<strong>$1</strong>"
    );

    // bullet lists

    html = html.replace(

        /(?:^|\n)- (.*?)(?=\n|$)/g,

        "<li>$1</li>"
    );

    // wrap list items in ul

    html = html.replace(

        /(<li>.*?<\/li>)/gs,

        "<ul>$1</ul>"
    );

    // paragraphs

    html = html
        .split(/\n\s*\n/)
        .map(block => {

            if(
                block.includes("<h") ||
                block.includes("<ul>")
            ){
                return block;
            }

            return `<p>${block}</p>`;
        })
        .join("");

    // single line breaks

    html = html.replace(
        /\n/g,
        "<br>"
    );

    return html;
}

function addMessage(sender,text){

    const chat =
        document.getElementById("chat");

    const div =
        document.createElement("div");

    div.className = "message";

    const formatted =
        formatMessage(text);

    if(sender === "You"){

        div.innerHTML = `
            <div class="user">You:</div>
            <div class="msg-text">
                ${formatted}
            </div>
        `;

    }else{

        div.innerHTML = `
            <div class="bot">L:</div>
            <div class="msg-text">
                ${formatted}
            </div>
        `;
    }

    chat.appendChild(div);

    chat.scrollTop =
        chat.scrollHeight;
}

async function sendMessage(){

    const input =
        document.getElementById("input");

    const message =
        input.value.trim();

    if(!message) return;

    addMessage(
        "You",
        message
    );

    input.value = "";

    try{

        const res = await fetch(

            "https://shine-l-production.up.railway.app/chat",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    message:message
                })
            }
        );

        const data =
            await res.json();

        addMessage(
            "L",
            data.reply ||
            "No reply received."
        );

    }catch(err){

        console.error(err);

        addMessage(
            "L",
            "Connection issue talking to Ellie."
        );
    }
}

async function uploadFile(){

    const fileInput =
        document.getElementById(
            "fileUpload"
        );

    const file =
        fileInput.files[0];

    if(!file) return;

    addMessage(
        "L",
        "Uploading: " + file.name
    );

    const formData =
        new FormData();

    formData.append(
        "file",
        file
    );

    try{

        const res = await fetch(

            "https://shine-l-production.up.railway.app/upload",

            {
                method:"POST",
                body:formData
            }
        );

        const data =
            await res.json();

        if(data.preview){

            addMessage(
                "L",
                "📄 File Preview:\n\n" +
                data.preview
            );

        }else{

            addMessage(
                "L",
                data.message ||
                "Upload complete."
            );
        }

    }catch(err){

        console.error(err);

        addMessage(
            "L",
            "❌ Upload failed."
        );
    }
}

document
.getElementById("input")
.addEventListener(

    "keydown",

    function(e){

        if(e.key === "Enter"){

            sendMessage();
        }
    }
);

</script>

</body>
</html>
