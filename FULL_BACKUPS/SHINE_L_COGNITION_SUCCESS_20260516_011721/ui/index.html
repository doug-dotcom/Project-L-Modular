<!DOCTYPE html>
<html>
<head>

<title>Shine L Runtime</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px;
}

.title{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    opacity:0.7;
    margin-bottom:30px;
}

.telemetry-panel{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:30px;
}

.telemetry-card{
    background:#111827;
    border-radius:12px;
    padding:18px;
}

.telemetry-title{
    opacity:0.7;
    font-size:13px;
    margin-bottom:8px;
}

.telemetry-value{
    font-size:20px;
    font-weight:bold;
}

.chatbox{
    background:#111827;
    border-radius:12px;
    padding:20px;
    min-height:400px;
    margin-bottom:20px;
    overflow-y:auto;
}

.message{
    margin-bottom:20px;
    padding:14px;
    border-radius:10px;
}

.user{
    background:#1e293b;
}

.l{
    background:#172554;
}

textarea{
    width:100%;
    height:90px;
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:16px;
    background:#111827;
    color:white;
    resize:none;
}

button{
    margin-top:15px;
    padding:14px 24px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.status{
    margin-top:20px;
    opacity:0.7;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

    <div class="title">Shine L Runtime</div>

    <div class="subtitle">
        Tegan Runtime • OpenAI Cognition • Live Orchestration
    </div>

    <!-- TELEMETRY -->

    <div class="telemetry-panel">

        <div class="telemetry-card">
            <div class="telemetry-title">Runtime</div>
            <div class="telemetry-value" id="runtimeStatus">
                ...
            </div>
        </div>

        <div class="telemetry-card">
            <div class="telemetry-title">Status</div>
            <div class="telemetry-value" id="systemStatus">
                ...
            </div>
        </div>

        <div class="telemetry-card">
            <div class="telemetry-title">Cognition</div>
            <div class="telemetry-value" id="cognitionStatus">
                ...
            </div>
        </div>

        <div class="telemetry-card">
            <div class="telemetry-title">Guardian</div>
            <div class="telemetry-value" id="guardianStatus">
                ...
            </div>
        </div>

    </div>

    <!-- CHAT -->

    <div id="chatbox" class="chatbox"></div>

    <textarea
        id="message"
        placeholder="Talk to L..."
    ></textarea>

    <button onclick="sendMessage()">
        Send To Runtime
    </button>

    <div class="status" id="status">
        Runtime standby...
    </div>

</div>

<script>

const API = "http://127.0.0.1:8000";


// =====================================================
// SEND MESSAGE
// =====================================================

async function sendMessage(){

    const input = document.getElementById("message");

    const chatbox = document.getElementById("chatbox");

    const status = document.getElementById("status");

    const text = input.value.trim();

    if(!text){
        return;
    }

    // -------------------------------------------------
    // USER MESSAGE
    // -------------------------------------------------

    chatbox.innerHTML += `
        <div class="message user">
            <b>You:</b><br>${text}
        </div>
    `;

    input.value = "";

    status.innerText = "Sending to runtime...";

    try{

        const response = await fetch(
            API + "/runtime/chat",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    message:text
                })
            }
        );

        const data = await response.json();

        // ---------------------------------------------
        // RUNTIME MESSAGE
        // ---------------------------------------------

        chatbox.innerHTML += `
            <div class="message l">

                <b>L:</b><br>

                ${data.response}

                <br><br>

                <small>
                    Runtime: ${data.runtime || "unknown"} |
                    Status: ${data.status || "unknown"} |
                    Cognition: ${data.cognition || "unknown"}
                </small>

            </div>
        `;

        status.innerText = "Runtime online.";

        chatbox.scrollTop = chatbox.scrollHeight;

    }
    catch(err){

        chatbox.innerHTML += `
            <div class="message l">
                <b>Runtime Error:</b><br>${err}
            </div>
        `;

        status.innerText = "Runtime degraded.";
    }
}


// =====================================================
// TELEMETRY
// =====================================================

async function loadTelemetry(){

    try{

        const response = await fetch(
            API + "/runtime/status"
        );

        const data = await response.json();

        document.getElementById(
            "runtimeStatus"
        ).innerText = data.runtime || "ONLINE";

        document.getElementById(
            "systemStatus"
        ).innerText = data.status || "STABLE";

        document.getElementById(
            "cognitionStatus"
        ).innerText = data.cognition || "ACTIVE";

        document.getElementById(
            "guardianStatus"
        ).innerText = data.guardian || "ONLINE";

    }
    catch(err){

        document.getElementById(
            "runtimeStatus"
        ).innerText = "OFFLINE";

        document.getElementById(
            "systemStatus"
        ).innerText = "ERROR";

        document.getElementById(
            "cognitionStatus"
        ).innerText = "OFFLINE";

        document.getElementById(
            "guardianStatus"
        ).innerText = "OFFLINE";
    }
}


// =====================================================
// STARTUP
// =====================================================

loadTelemetry();

setInterval(loadTelemetry, 5000);

</script>

</body>
</html>
