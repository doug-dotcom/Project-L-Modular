<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project L</title>

    <link rel="icon" type="image/png" href="/ui/icon.png">

    <style>

        * {
            box-sizing: border-box;
        }

        html,
        body {

            margin: 0;
            padding: 0;

            width: 100%;
            height: 100%;

            overflow: hidden;

            background: linear-gradient(
                180deg,
                #0f172a,
                #172554
            );

            font-family: Arial, sans-serif;

            color: white;
        }

        body {

            display: flex;
            flex-direction: column;
        }

        header {

            padding: 18px;

            font-size: 30px;

            font-weight: bold;

            color: #22c55e;

            border-bottom: 1px solid rgba(255,255,255,0.08);

            background: rgba(0,0,0,0.15);

            backdrop-filter: blur(6px);
        }

        #chat {

            flex: 1;

            overflow-y: auto;

            padding: 20px;

            display: flex;

            flex-direction: column;

            gap: 14px;

            scroll-behavior: smooth;
        }

        .msg {

            padding: 14px 18px;

            border-radius: 14px;

            max-width: 90%;

            width: fit-content;

            line-height: 1.5;

            font-size: 15px;

            word-wrap: break-word;

            align-self: flex-start;
        }

        .user {

            background: #2563eb;
        }

        .assistant {

            background: rgba(255,255,255,0.10);

            border: 1px solid rgba(255,255,255,0.08);
        }

        .error {

            background: #7f1d1d;
        }

        #inputBar {

            display: flex;

            gap: 12px;

            padding: 14px;

            background: rgba(0,0,0,0.20);

            border-top: 1px solid rgba(255,255,255,0.08);

            backdrop-filter: blur(8px);

            position: sticky;

            bottom: 0;
        }

        #message {

            flex: 1;

            padding: 14px;

            border-radius: 14px;

            border: none;

            outline: none;

            resize: none;

            min-height: 60px;

            max-height: 180px;

            overflow-y: auto;

            font-size: 16px;

            background: rgba(255,255,255,0.08);

            color: white;

            font-family: Arial, sans-serif;
        }

        #message::placeholder {

            color: rgba(255,255,255,0.5);
        }

        button {

            min-width: 90px;

            border: none;

            border-radius: 14px;

            background: #22c55e;

            color: black;

            font-weight: bold;

            font-size: 15px;

            cursor: pointer;

            transition: 0.2s;
        }

        button:hover {

            background: #16a34a;
        }

        @media (max-width: 768px) {

            header {

                font-size: 24px;

                padding: 14px;
            }

            #chat {

                padding: 14px;
            }

            .msg {

                max-width: 96%;

                font-size: 14px;
            }

            #inputBar {

                padding-bottom: 22px;
            }

            #message {

                min-height: 70px;
            }

            button {

                min-width: 75px;
            }
        }

    </style>

</head>

<body>

    <header>
        Project L
    </header>

    <div id="chat">

        <div class="msg assistant">
            L online 👊
        </div>

    </div>

    <div id="inputBar">

        <textarea
            id="message"
            placeholder="Talk to L..."
        ></textarea>

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

    <script>

        const API_URL = "/chat";

        async function sendMessage() {

            const input = document.getElementById("message");

            const chat = document.getElementById("chat");

            const message = input.value.trim();

            if (!message) return;

            // ---------------------------------
            // USER MESSAGE
            // ---------------------------------

            chat.innerHTML += `
                <div class="msg user">
                    ${message}
                </div>
            `;

            input.value = "";

            // ---------------------------------
            // THINKING
            // ---------------------------------

            const thinkingId = "thinking-" + Date.now();

            chat.innerHTML += `
                <div class="msg assistant" id="${thinkingId}">
                    L is thinking...
                </div>
            `;

            chat.scrollTop = chat.scrollHeight;

            try {

                const response = await fetch(API_URL, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        message: message
                    })
                });

                const data = await response.json();

                // REMOVE THINKING

                document.getElementById(thinkingId).remove();

                // ASSISTANT RESPONSE

                chat.innerHTML += `
                    <div class="msg assistant">
                        ${data.reply}
                    </div>
                `;

            } catch (err) {

                document.getElementById(thinkingId).remove();

                chat.innerHTML += `
                    <div class="msg assistant error">
                        Connection error.
                    </div>
                `;
            }

            chat.scrollTop = chat.scrollHeight;
        }

    </script>

</body>

</html>
