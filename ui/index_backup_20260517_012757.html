<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project L</title>

    <link rel="icon" type="image/png" href="/ui/icon.png">

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;
            padding: 0;

            background: #0f172a;

            color: white;

            font-family: Arial, sans-serif;

            display: flex;

            flex-direction: column;

            height: 100vh;
        }

        header {

            background: #111827;

            padding: 20px;

            border-bottom: 1px solid #1f2937;

            font-size: 28px;

            font-weight: bold;

            color: #22c55e;
        }

        #chat {

            flex: 1;

            overflow-y: auto;

            padding: 20px;

            display: flex;

            flex-direction: column;

            gap: 12px;
        }

        .msg {

            padding: 14px;

            border-radius: 12px;

            max-width: 80%;

            line-height: 1.5;
        }

        .user {

            background: #2563eb;

            align-self: flex-end;
        }

        .assistant {

            background: #1e293b;

            align-self: flex-start;
        }

        .error {

            background: #7f1d1d;
        }

        #inputBar {

            display: flex;

            padding: 16px;

            background: #111827;

            border-top: 1px solid #1f2937;
        }

        #message {

            flex: 1;

            padding: 14px;

            border-radius: 10px;

            border: none;

            outline: none;

            font-size: 16px;

            background: #1e293b;

            color: white;
        }

        button {

            margin-left: 12px;

            padding: 14px 20px;

            border: none;

            border-radius: 10px;

            background: #22c55e;

            color: black;

            font-weight: bold;

            cursor: pointer;
        }

        button:hover {

            background: #16a34a;
        }

    </style>

</head>

<body>

    <header>
        Project L
    </header>

    <div id="chat">

        <div class="msg assistant">
            L online 👊
        </div>

    </div>

    <div id="inputBar">

        <input
            id="message"
            type="text"
            placeholder="Talk to L..."
            onkeypress="if(event.key==='Enter') sendMessage()"
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

    <script>

        const API_URL = "/chat";

        async function sendMessage() {

            const input = document.getElementById("message");

            const chat = document.getElementById("chat");

            const message = input.value.trim();

            if (!message) return;

            // ---------------------------------
            // USER MESSAGE
            // ---------------------------------

            chat.innerHTML += `
                <div class="msg user">
                    ${message}
                </div>
            `;

            input.value = "";

            // ---------------------------------
            // THINKING
            // ---------------------------------

            const thinkingId = "thinking-" + Date.now();

            chat.innerHTML += `
                <div class="msg assistant" id="${thinkingId}">
                    L is thinking...
                </div>
            `;

            chat.scrollTop = chat.scrollHeight;

            try {

                const response = await fetch(API_URL, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        message: message
                    })
                });

                const data = await response.json();

                // REMOVE THINKING

                document.getElementById(thinkingId).remove();

                // ASSISTANT RESPONSE

                chat.innerHTML += `
                    <div class="msg assistant">
                        ${data.reply}
                    </div>
                `;

            } catch (err) {

                document.getElementById(thinkingId).remove();

                chat.innerHTML += `
                    <div class="msg assistant error">
                        Connection error.
                    </div>
                `;
            }

            chat.scrollTop = chat.scrollHeight;
        }

    </script>

</body>

</html>
