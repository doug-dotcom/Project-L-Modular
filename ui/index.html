<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project L</title>

<style>

body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
    margin:0;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    color:#38bdf8;
}

#chat{
    height:500px;
    overflow-y:auto;
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.message{
    margin-bottom:18px;
    padding:12px;
    border-radius:10px;
}

.user{
    background:#1e293b;
}

.assistant{
    background:#0f766e;
}

textarea{
    width:100%;
    height:100px;
    background:#111827;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:16px;
}

button{
    margin-top:15px;
    background:#0284c7;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0369a1;
}

.status{
    margin-top:15px;
    color:#94a3b8;
}

</style>
<link rel="icon" type="image/png" href="/ui/icon.png">
</head>

<body>

<div class="container">

<h1>Project L</h1>

<div id="chat"></div>

<textarea id="message" placeholder="Talk to L..."></textarea>

<button onclick="sendMessage()">Send</button>

<div class="status" id="status">
Waiting...
</div>

</div>

<script>

const API_URL = "https://project-l-modular-production.up.railway.app/chat";

async function sendMessage() {

    const input = document.getElementById("message");

    const chat = document.getElementById("chat");

    const message = input.value.trim();

    if (!message) return;

    // -------------------------------------
    // USER MESSAGE
    // -------------------------------------

    chat.innerHTML += `
        <div class="msg user">
            ${message}
        </div>
    `;

    input.value = "";

    // -------------------------------------
    // LOADING
    // -------------------------------------

    const thinkingId = "thinking-" + Date.now();

    chat.innerHTML += `
        <div class="msg assistant" id="${thinkingId}">
            L is thinking...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try {

        const response = await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        // ---------------------------------
        // REMOVE THINKING
        // ---------------------------------

        document.getElementById(thinkingId).remove();

        // ---------------------------------
        // ASSISTANT RESPONSE
        // ---------------------------------

        chat.innerHTML += `
            <div class="msg assistant">
                ${data.reply}
            </div>
        `;

    } catch (err) {

        document.getElementById(thinkingId).remove();

        chat.innerHTML += `
            <div class="msg assistant error">
                Connection error.
            </div>
        `;
    }

    chat.scrollTop = chat.scrollHeight;
}

</script>
</body>
</html>
