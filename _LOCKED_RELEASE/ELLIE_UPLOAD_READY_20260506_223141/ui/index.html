<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<title>Shine L</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a5f);
    color:white;
    min-height:100vh;
    overflow:auto;
}

.container{
    display:flex;
    flex-direction:column;
    min-height:100vh;
    width:100%;
    max-width:900px;
    margin:auto;
    padding-bottom:8px;
}

.header{
    padding:18px;
    font-size:34px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:18px;
    padding-bottom:120px;
    background:rgba(0,0,0,0.25);
    border-radius:16px;
    margin:0 12px 12px 12px;
    font-size:20px;
    line-height:1.6;
    min-height:60vh;
}

.message{
    margin-bottom:24px;
}

.user{
    color:#ffffff;
    font-weight:bold;
    margin-bottom:4px;
}

.bot{
    color:#8fffa2;
    font-weight:bold;
    margin-bottom:4px;
}

.input-row{
    display:flex;
    gap:10px;
    padding:12px;
    background:rgba(0,0,0,0.2);
    position:sticky;
    bottom:0;
}

input{
    flex:1;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:18px;
    outline:none;
    min-width:0;
}

button{
    background:#00d26a;
    color:white;
    border:none;
    border-radius:12px;
    padding:16px 20px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

@media(max-width:600px){

    .header{
        font-size:36px;
        padding:20px 18px;
    }

    .chat-box{
        font-size:18px;
        margin:0 8px 8px 8px;
        padding:16px;
        min-height:62vh;
    }

    .input-row{
        padding:10px;
        padding-bottom:calc(10px + env(safe-area-inset-bottom));
    }

    input{
        font-size:16px;
        padding:14px;
    }

    button{
        font-size:16px;
        padding:14px 18px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        Shine L
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-row">
        <input id="input" placeholder="Talk to L..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function addMessage(sender, text){
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "message";

    if(sender === "You"){
        div.innerHTML = `
            <div class="user">You:</div>
            <div>${text}</div>
        `;
    }else{
        div.innerHTML = `
            <div class="bot">L:</div>
            <div>${text}</div>
        `;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
    const input = document.getElementById("input");
    const message = input.value.trim();

    if(!message) return;

    addMessage("You", message);
    input.value = "";

    try{
        const res = await fetch(
            "https://shine-l-production.up.railway.app/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    message:message
                })
            }
        );

        if(!res.ok){
            const text = await res.text();
            throw new Error(text);
        }

        const data = await res.json();

        addMessage(
            "L",
            data.reply || "No reply received."
        );

    }catch(err){
        console.error("FULL ERROR:", err);
        addMessage(
            "L",
            "Connection issue talking to Ellie."
        );
    }
}

document
.getElementById("input")
.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
